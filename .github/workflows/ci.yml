name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend-test:
    name: Backend Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install dependencies
        working-directory: workshop-backend
        run: npm install
      - name: Run tests
        working-directory: workshop-backend
        run: npm test

  frontend-build:
    name: Frontend Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install dependencies
        working-directory: workshop-frontend
        run: npm install
      - name: Build production
        working-directory: workshop-frontend
        run: npx ng build --configuration production

  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build backend image
        run: docker build -t workshop-api ./workshop-backend
      - name: Build frontend image
        run: docker build -t workshop-frontend ./workshop-frontend
